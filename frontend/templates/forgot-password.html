<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quên mật khẩu | EduNext Aurora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Inter"', 'sans-serif'] },
                    colors: { brand: { blue: '#0066FF', dark: '#0B1120' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; font-size: 14px; letter-spacing: -0.01em; }
        .bg-main {
            background: linear-gradient(135deg, #1e40af 0%, #4338ca 50%, #6d28d9 100%);
            overflow: hidden;
        }
        /* Hiệu ứng Stacked Card 3 lớp đồng bộ hệ thống */
        .stacked-container { position: relative; padding: 20px; }
        .layer-2 { position: absolute; top: 35px; left: 35px; right: 5px; bottom: 5px; background: rgba(255, 255, 255, 0.35); border-radius: 24px; z-index: 5; }
        .layer-3 { position: absolute; top: 50px; left: 50px; right: -10px; bottom: -10px; background: rgba(255, 255, 255, 0.15); border-radius: 24px; z-index: 0; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        
        .btn-brand {
            background: #0066FF;
            transition: all 0.3s ease;
            color: white !important;
        }
        .btn-brand:hover { background: #0044CC; transform: translateY(-1px); }
    </style>
</head>
<body class="bg-main min-h-screen w-full flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid lg:grid-cols-2 items-center gap-12 z-10">
        
        <div class="hidden lg:flex flex-col items-center text-center text-white p-8">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="ph-fill ph-graduation-cap text-3xl text-blue-600"></i>
                </div>
                <span class="text-3xl font-extrabold tracking-tighter uppercase">Edu<span class="opacity-70">Next</span></span>
            </div>

            <div class="relative w-64 h-64 mb-10 flex items-center justify-center">
                <div class="absolute inset-0 border-2 border-white/20 rounded-full animate-[spin_20s_linear_infinite]"></div>
                <div class="w-40 h-40 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center border border-white/30">
                    <i class="ph-fill ph-key text-6xl text-blue-300"></i>
                </div>
            </div>

            <h1 class="text-3xl font-extrabold uppercase mb-4">Khôi phục truy cập</h1>
            <p class="max-w-sm leading-relaxed opacity-80 font-medium italic">
                Đừng lo lắng, chúng tôi sẽ giúp bạn lấy lại mật khẩu để tiếp tục hành trình học tập.
            </p>
        </div>

        <div class="flex justify-center">
            <div class="stacked-container w-full max-w-[480px]">
                <div class="layer-2"></div>
                <div class="layer-3"></div>

                <div class="glass-card p-10 lg:p-12">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h2 class="text-2xl font-extrabold uppercase tracking-tight text-slate-800">Quên mật khẩu</h2>
                            <p class="text-slate-500 font-medium">Nhập email để nhận mật khẩu mới</p>
                        </div>
                        <a href="/" class="p-3 bg-slate-50 rounded-full hover:bg-blue-50 transition-colors">
                            <i class="ph-bold ph-house-line text-lg text-slate-600"></i>
                        </a>
                    </div>

                    <form onsubmit="handleForgotPassword(event)" class="space-y-6">
                        <div class="relative">
                            <i class="ph-bold ph-envelope-simple absolute left-4 top-4 text-slate-400 text-lg"></i>
                            <input type="email" id="email" placeholder="Email đăng ký của bạn" 
                                   class="w-full bg-slate-50 border border-slate-200 pl-12 pr-4 py-4 rounded-xl outline-none font-semibold focus:border-blue-500 transition-all" required>
                        </div>

                        <button type="submit" class="btn-submit w-full btn-brand py-4 rounded-xl font-bold uppercase text-[12px] shadow-lg active:scale-95 transition-all">
                            Gửi yêu cầu khôi phục
                        </button>
                    </form>

                    <div class="mt-10 text-center border-t border-slate-100 pt-8">
                        <a href="/login" class="inline-flex items-center gap-2 text-blue-600 font-bold hover:underline transition-all group">
                            <i class="ph-bold ph-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                            Quay lại đăng nhập
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function handleForgotPassword(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            const email = document.getElementById('email').value;
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="ph-bold ph-spinner-gap animate-spin"></i> Đang xử lý...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const data = await response.json();

                if (data.success) {
                    alert("✅ Thành công! Mật khẩu mới đã được gửi về email của bạn.");
                    window.location.href = "/login";
                } else {
                    alert("⚠️ Lỗi: " + data.message);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                alert("❌ Lỗi kết nối server!");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
