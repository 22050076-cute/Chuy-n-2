<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký | EduNext Aurora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Inter"', 'sans-serif'] },
                    colors: { brand: { blue: '#0066FF', dark: '#0B1120' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; font-size: 14px; letter-spacing: -0.01em; }
        .bg-main { background: linear-gradient(135deg, #1e40af 0%, #4338ca 50%, #6d28d9 100%); overflow: hidden; }
        .stacked-container { position: relative; padding: 20px; }
        .layer-2 { position: absolute; top: 35px; left: 35px; right: 5px; bottom: 5px; background: rgba(255, 255, 255, 0.35); border-radius: 24px; z-index: 5; }
        .layer-3 { position: absolute; top: 50px; left: 50px; right: -10px; bottom: -10px; background: rgba(255, 255, 255, 0.15); border-radius: 24px; z-index: 0; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        .role-card { transition: all 0.3s ease; border: 2px solid #f1f5f9; }
        input[type="radio"]:checked + .role-card { border-color: #0066FF; background-color: #f0f7ff; color: #0066FF; transform: scale(1.05); }
        .slide-content { animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-main min-h-screen w-full flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid lg:grid-cols-2 items-center gap-12 z-10">
        <div class="hidden lg:flex flex-col items-center text-center text-white p-12 min-h-[600px] justify-between relative">
            <div class="flex flex-col items-center gap-3 mb-6 relative z-10">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-white/10 backdrop-blur-lg rounded-2xl flex items-center justify-center border border-white/20 shadow-xl">
                        <i class="ph-fill ph-graduation-cap text-3xl text-white"></i>
                    </div>
                    <span class="text-4xl font-black tracking-tighter uppercase">Edu<span class="text-blue-400">Next</span></span>
                </div>
                <p class="text-xs uppercase tracking-[0.3em] font-bold text-blue-200/80">Kiến tạo tương lai số</p>
            </div>

            <div class="flex-1 flex items-center justify-center w-full relative slide-content">
                <div class="relative w-80 h-80 mb-12 flex items-center justify-center">
                    <div class="absolute inset-0 bg-blue-500/20 blur-[80px] rounded-full"></div>
                    <div class="absolute inset-0 border border-white/10 rounded-full animate-[spin_40s_linear_infinite]"></div>
                    <div class="absolute inset-8 border border-white/20 rounded-full animate-[spin_30s_linear_infinite_reverse]"></div>
                    <div class="w-36 h-36 p-1.5 bg-gradient-to-br from-white/40 to-transparent backdrop-blur-md rounded-full z-10 shadow-2xl">
                        <div class="w-full h-full rounded-full overflow-hidden border-2 border-white/80">
                             <img src="https://images.unsplash.com/photo-1577896332579-a985a3d19856?q=80&w=400" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <div class="absolute -top-4 bg-white p-3 rounded-2xl shadow-xl text-blue-600 animate-bounce"><i class="ph-fill ph-user-plus text-2xl"></i></div>
                </div>
            </div>
            <h2 class="text-3xl font-black uppercase leading-none">Gia nhập <span class="text-blue-300 italic">ngay</span></h2>
        </div>

        <div class="flex justify-center">
            <div class="stacked-container w-full max-w-[500px]">
                <div class="layer-2"></div><div class="layer-3"></div>
                <div class="glass-card p-8 lg:p-10">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-2xl font-extrabold text-slate-800 uppercase">Đăng ký</h2>
                            <p class="text-slate-500 font-medium">Khởi tạo định danh số mới</p>
                        </div>
                        <a href="/" class="p-3 bg-slate-50 rounded-full hover:bg-blue-50 transition-colors"><i class="ph-bold ph-house-line text-lg text-slate-600"></i></a>
                    </div>

                    <form onsubmit="handleRegister(event)" class="space-y-4">
                        <div class="relative">
                            <i class="ph-bold ph-user absolute left-4 top-4 text-slate-400"></i>
                            <input type="text" id="fullname" placeholder="Họ và tên" class="w-full bg-slate-50 border border-slate-200 pl-12 pr-4 py-4 rounded-xl outline-none font-semibold focus:border-blue-500 transition-all" required>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="role" value="Teacher" class="hidden" checked>
                                <div class="role-card p-3 rounded-xl bg-white text-slate-400 text-center">
                                    <i class="ph-fill ph-chalkboard-teacher text-2xl mb-1"></i>
                                    <p class="text-[9px] font-bold uppercase">Giáo viên</p>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="role" value="Student" class="hidden">
                                <div class="role-card p-3 rounded-xl bg-white text-slate-400 text-center">
                                    <i class="ph-fill ph-student text-2xl mb-1"></i>
                                    <p class="text-[9px] font-bold uppercase">Học sinh</p>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="role" value="Parent" class="hidden">
                                <div class="role-card p-3 rounded-xl bg-white text-slate-400 text-center">
                                    <i class="ph-fill ph-users text-2xl mb-1"></i>
                                    <p class="text-[9px] font-bold uppercase">Phụ huynh</p>
                                </div>
                            </label>
                        </div>

                        <div class="relative">
                            <i class="ph-bold ph-envelope-simple absolute left-4 top-4 text-slate-400"></i>
                            <input type="email" id="email" placeholder="Email" class="w-full bg-slate-50 border border-slate-200 pl-12 pr-4 py-4 rounded-xl outline-none font-semibold focus:border-blue-500 transition-all" required>
                        </div>

                        <div class="relative">
                            <i class="ph-bold ph-lock absolute left-4 top-4 text-slate-400"></i>
                            <input type="password" id="password" placeholder="Mật khẩu" class="w-full bg-slate-50 border border-slate-200 pl-12 pr-12 py-4 rounded-xl outline-none font-semibold focus:border-blue-500 transition-all" required>
                        </div>

                        <div class="relative">
                            <i class="ph-bold ph-shield-check absolute left-4 top-4 text-slate-400"></i>
                            <input type="password" id="confirm_password" placeholder="Xác nhận mật khẩu" class="w-full bg-slate-50 border border-slate-200 pl-12 pr-4 py-4 rounded-xl outline-none font-semibold focus:border-blue-500 transition-all" required>
                        </div>

                        <div class="flex items-start gap-2 py-1">
                            <input type="checkbox" id="terms" class="w-4 h-4 mt-0.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500" required>
                            <label for="terms" class="text-[11px] text-slate-500 font-medium">Tôi đồng ý với <a href="#" class="text-blue-600 underline">Điều khoản dịch vụ</a> và <a href="#" class="text-blue-600 underline">Chính sách bảo mật</a> của EduNext.</label>
                        </div>

                        <button type="submit" class="btn-register w-full btn-brand py-4 rounded-xl font-bold uppercase text-[12px] shadow-lg active:scale-95 transition-all">Xác nhận đăng ký</button>
                    </form>

                    <div class="mt-6 text-center text-slate-500 font-medium">Đã có tài khoản? <a href="/login" class="text-blue-600 font-bold hover:underline">Đăng nhập</a></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const btn = document.querySelector('.btn-register');
            const originalText = btn.innerHTML;

            // 1. Kiểm tra mật khẩu khớp nhau
            if (password !== confirm_password) {
                alert("⚠️ Mật khẩu xác nhận không khớp. Vui lòng kiểm tra lại!");
                return;
            }

            const data = {
                fullname: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                password: password,
                role: document.querySelector('input[name="role"]:checked').value
            };

            btn.innerHTML = '<i class="ph-bold ph-spinner-gap animate-spin"></i> Đang xử lý...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.success) {
                    alert("🎉 Đăng ký thành công! Bạn có thể đăng nhập ngay.");
                    window.location.href = "/login";
                } else {
                    alert("⚠️ Lỗi: " + result.message);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                alert("❌ Lỗi kết nối server!");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
