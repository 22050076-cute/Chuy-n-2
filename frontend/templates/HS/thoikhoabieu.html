<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời khóa biểu | EduNext</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { edunext: { primary: '#ee0033', dark: '#1e293b', bg: '#f8fafc' } }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sidebar-link:hover { background: rgba(238, 0, 51, 0.05); color: #ee0033; }
        .sidebar-active { background: #ee0033 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(238, 0, 51, 0.2); }
        
        .schedule-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
        .schedule-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); border-color: #fee2e2; }
        
        .status-pending { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body class="bg-edunext-bg font-sans text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden lg:flex relative z-20">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-edunext-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-red-200">
                <i class="ph-fill ph-graduation-cap text-2xl"></i>
            </div>
            <span class="font-extrabold text-xl text-edunext-dark tracking-tight">Edu<span class="text-edunext-primary">Next</span></span>
        </div>

        <nav class="flex-1 px-4 py-2 space-y-1.5 overflow-y-auto">
            <p class="px-4 pt-4 pb-2 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Học tập & Hoạt động</p>
            
            <a href="/dashboard" class="sidebar-link flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all text-slate-500 hover:text-edunext-primary">
                <i class="ph-fill ph-house text-xl"></i> Bàn học của tôi
            </a>
            
            <a href="/kho-hoc-lieu" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium transition-all group">
                <i class="ph-fill ph-books text-xl opacity-70 group-hover:text-edunext-primary"></i> Kho học liệu
            </a>
            
            <a href="/bai-tap" class="sidebar-link flex items-center justify-between px-4 py-3 rounded-xl text-slate-500 font-medium transition-all group">
                <div class="flex items-center gap-3"><i class="ph-fill ph-exam text-xl"></i> Bài tập & Kiểm tra</div>
            </a>
            
            <a href="/thoi-khoa-bieu" class="sidebar-link sidebar-active flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all group">
                <i class="ph-fill ph-calendar-check text-xl"></i> Thời khóa biểu
            </a>

            <a href="/bang-thanh-tich" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium transition-all group hover:text-amber-500">
                <i class="ph-fill ph-medal text-xl opacity-70 group-hover:text-amber-500"></i> Bảng thành tích
            </a>
            <a href="/hoc-sinh/tin-nhan" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 font-medium transition-all group hover:text-edunext-primary">
                <i class="ph-fill ph-messenger-logo text-xl opacity-70"></i> Tin nhắn
            </a>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <div class="bg-slate-50 p-3 rounded-2xl flex items-center gap-3 border border-slate-100 shadow-sm">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                <div class="flex-1 min-w-0">
                    <p id="user-fullname-sidebar" class="font-bold text-sm text-slate-800 truncate">Học sinh</p>
                    <p id="user-class-sidebar" class="text-[10px] text-slate-500 font-semibold uppercase">Lớp</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-30 flex items-center justify-between px-8 py-4">
            <div>
                <h2 class="text-xl font-bold text-slate-800">Thời khóa biểu tuần tới</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="px-2 py-0.5 bg-emerald-100 text-emerald-600 text-[10px] font-bold rounded-md uppercase tracking-wide">Hệ thống đã mở</span>
                    <p class="text-xs text-slate-500 font-medium uppercase tracking-widest">Tuần 29 (30/03 - 05/04)</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button class="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 text-slate-600 transition-all shadow-sm">
                    <i class="ph-bold ph-printer"></i>
                </button>
                <button class="px-5 py-2.5 bg-slate-900 text-white rounded-xl text-xs font-bold shadow-lg hover:bg-edunext-primary transition-all">
                    Tải TKB (.PDF)
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-8">
            <div class="min-w-[1100px]">
                
                <div class="grid grid-cols-8 gap-4 mb-6" id="calendar-header">
                    <div class="flex flex-col justify-center items-center py-4">
                        <i class="ph-bold ph-clock-afternoon text-slate-300 text-xl"></i>
                    </div>
                    <script>
                        const days = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "CN"];
                        const dates = [30, 31, 1, 2, 3, 4, 5];
                        days.forEach((day, i) => {
                            const isToday = i === 1; // Giả sử hôm nay là Thứ 3
                            document.write(`
                                <div class="text-center ${isToday ? 'bg-white ring-2 ring-edunext-primary ring-offset-2' : 'bg-white'} p-4 rounded-3xl border border-slate-100 shadow-sm transition-all hover:shadow-md">
                                    <p class="text-[10px] font-black ${isToday ? 'text-edunext-primary' : 'text-slate-400'} uppercase tracking-widest">${day}</p>
                                    <p class="text-xl font-black text-slate-800">${dates[i] < 10 ? '0' + dates[i] : dates[i]}</p>
                                    ${dates[i] === 1 ? '<p class="text-[9px] font-bold text-slate-300 mt-1 uppercase text-blue-500">Tháng 04</p>' : ''}
                                </div>
                            `);
                        });
                    </script>
                </div>

                <div class="space-y-4" id="schedule-body"></div>

            </div>
        </div>
    </main>

<script>
let scheduleData = [];
let studentClassId = null;

async function init() {
    try {
        console.log("Đang khởi tạo Thời khóa biểu học sinh...");
        // 1. Lấy thông tin người dùng để có MaLop
        const pRes = await fetch('/api/user/profile');
        const profile = await pRes.json();
        console.log("Thông tin Profile:", profile);

        if (profile.success && profile.data) {
            studentClassId = profile.data.class_id;
            console.log("MaLop của học sinh:", studentClassId);
            
            if (!studentClassId) {
                console.warn("Không tìm thấy MaLop trong profile!");
                // alert("Tài khoản của bạn chưa được phân lớp. Vui lòng liên hệ giáo viên.");
            }
            // Cập nhật giao diện bằng ID (Tránh lỗi Selector Tailwind)
            const nameEl = document.getElementById('user-fullname-sidebar');
            if (nameEl) nameEl.innerText = profile.data.fullname;
            const classEl = document.getElementById('user-class-sidebar');
            if (classEl) classEl.innerText = `Lớp ${profile.data.class_name || 'N/A'}`;
        } else {
            console.error("Không lấy được profile người dùng");
        }

        if (!studentClassId) {
            console.warn("Không tìm thấy MaLop, sử dụng mặc định là 1");
            studentClassId = 1;
        }

        // 2. Lấy dữ liệu thời khóa biểu từ API
        console.log(`Đang tải TKB cho MaLop: ${studentClassId}`);
        const tRes = await fetch(`/api/teacher/schedule?class_id=${studentClassId}`);
        const tData = await tRes.json();
        console.log("Dữ liệu TKB nhận được:", tData);

        if (tData.success) {
            scheduleData = tData.data;
            if (scheduleData.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 bg-slate-50 rounded-[3rem] border-2 border-dashed border-slate-200">
                        <i class="ph ph-calendar-blank text-6xl text-slate-300 mb-4"></i>
                        <p class="text-slate-500 font-bold italic text-lg">Lớp hiện chưa có dữ liệu thời khóa biểu</p>
                    </div>
                `;
                return;
            }
            renderWeeklySchedule();
        } else {
            console.error("Lỗi khi lấy TKB:", tData.message);
        }
    } catch (err) {
        console.error("Lỗi logic init:", err);
    }
}

function renderWeeklySchedule() {
    const container = document.getElementById('schedule-body');
    const slots = [
        { label: "Tiết 1", time: "07:30 - 08:15" },
        { label: "Tiết 2", time: "08:20 - 09:05" },
        { label: "Tiết 3", time: "09:20 - 10:05" },
        { label: "Tiết 4", time: "10:10 - 10:55" },
        { label: "Tiết 5", time: "11:00 - 11:45" }
    ];

    let html = '';
    slots.forEach((timeSlot, slotIndex) => {
        const slotId = slotIndex + 1;
        html += `<div class="grid grid-cols-8 gap-4 items-stretch min-h-[100px]">
            <div class="flex flex-col justify-center items-center border-r border-dashed border-slate-200 pr-2">
                <span class="text-xs font-black text-slate-800 italic">${timeSlot.label}</span>
                <span class="text-[10px] font-bold text-slate-400 mt-1">${timeSlot.time}</span>
            </div>`;

        for (let day = 2; day <= 8; day++) {
            // Kiểm tra linh hoạt cả thuộc tính chữ hoa và chữ thường
            const reg = scheduleData.find(r => {
                const rThu = r.Thu !== undefined ? r.Thu : r.thu;
                const rTiet = r.Tiet !== undefined ? r.Tiet : r.tiet;
                return Number(rThu) === Number(day) && Number(rTiet) === Number(slotId);
            });
            
            if (reg) {
                const colors = ["blue", "rose", "amber", "emerald", "violet", "sky", "orange", "indigo", "slate"];
                const color = colors[reg.MaMonHoc % colors.length] || "slate";
                const colorMap = { 
                    blue: "bg-blue-50 text-blue-600 border-blue-100", 
                    rose: "bg-rose-50 text-rose-600 border-rose-100", 
                    amber: "bg-amber-50 text-amber-600 border-amber-100", 
                    emerald: "bg-emerald-50 text-emerald-600 border-emerald-100", 
                    violet: "bg-violet-50 text-violet-600 border-violet-100", 
                    sky: "bg-sky-50 text-sky-600 border-sky-100", 
                    orange: "bg-orange-50 text-orange-600 border-orange-100", 
                    slate: "bg-slate-100 text-slate-600 border-slate-200", 
                    indigo: "bg-indigo-50 text-indigo-600 border-indigo-100"
                };
                const theme = colorMap[color];
                const tenGV = reg.TenGiaoVienBoMon || reg.tengiaovienbomon || "GV Bộ môn";
                
                html += `<div class="schedule-card bg-white p-4 rounded-[2rem] shadow-sm flex flex-col justify-center items-center group cursor-pointer border-slate-50 min-h-[100px]">
                    <div class="text-center">
                        <span class="px-2 py-0.5 ${theme} border text-[9px] font-black rounded-lg uppercase tracking-tighter">${reg.TenMonHoc}</span>
                        <p class="font-bold text-slate-800 text-xs mt-3 leading-tight group-hover:text-edunext-primary transition-colors">${tenGV}</p>
                    </div>
                </div>`;
            } else {
                html += `<div class="bg-slate-50/30 border border-dashed border-slate-100 rounded-[2rem] transition-all hover:bg-slate-50/60 cursor-crosshair"></div>`;
            }
        }
        html += `</div>`;
    });
    container.innerHTML = html;
}

init();
</script>
</body>
</html>
